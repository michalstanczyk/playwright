name: Deploy Trace Viewer to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'packages/trace-viewer/**'
      - 'packages/web/**'
      - 'packages/isomorphic/**'
      - 'packages/trace/**'
      - 'packages/playwright/src/isomorphic/**'
      - 'packages/playwright-core/**'
      - 'packages/protocol/**'
      - 'packages/injected/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-trace-viewer-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build trace viewer
        run: |
          cd packages/trace-viewer
          rm -rf ../playwright-core/lib/vite/traceViewer
          npx vite --config vite.sw.config.ts build
          npx vite build

      - name: Stage artifact
        run: |
          mkdir -p _site
          cp -r packages/playwright-core/lib/vite/traceViewer/. _site/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
